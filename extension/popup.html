<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 360px; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; padding: 16px; }
  h2 { font-size: 18px; margin-bottom: 12px; color: #1f2937; }
  .url-box { background: #f3f4f6; padding: 10px; border-radius: 6px; font-size: 12px; color: #6b7280; word-break: break-all; margin-bottom: 12px; max-height: 48px; overflow: hidden; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #f3f4f6; color: #374151; }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn-outline { background: #fff; color: #3b82f6; border: 1px solid #3b82f6; }
  .status { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 8px; }
  .divider { border-top: 1px solid #e5e7eb; margin: 12px 0; }
  label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px; }
  textarea { width: 100%; height: 100px; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 12px; resize: vertical; }
</style>
</head>
<body>
  <h2>真相捕手 TruthCatcher</h2>
  <label>当前页面</label>
  <div class="url-box" id="urlDisplay">加载中...</div>

  <button class="btn btn-primary" id="btnGetSelection">获取页面选中文字</button>
  <button class="btn btn-secondary" id="btnOpenApp">打开 TruthCatcher</button>

  <div class="divider"></div>

  <label>分析文本（选中文章文字后点上方按钮自动填入）</label>
  <textarea id="textInput" placeholder="或手动粘贴文章内容..."></textarea>
  <button class="btn btn-outline" id="btnAnalyzeText">带上文字打开 TruthCatcher</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
